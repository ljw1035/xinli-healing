<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220%22 width=%22100%22 height=%22100%22><text y=%220.9em%22 font-size=%2290%22>💖</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7FB3D5" />
    <link rel="manifest" href="/manifest.json" />
    <title>心声疗愈 - AI心理学循证支持智能体</title>
    <style>
      /* 隐私声明弹窗样式（原生 JS 实现，不依赖 React JSX） */
      #privacy-overlay {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      #privacy-backdrop {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(30, 41, 59, 0.6);
        backdrop-filter: blur(4px);
      }
      #privacy-modal {
        position: relative;
        width: 100%;
        max-width: 32rem;
        background: white;
        border-radius: 1.5rem;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        border: 1px solid rgb(241, 245, 249);
        overflow: hidden;
        animation: fadeIn 0.3s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .privacy-btn {
        padding: 0.75rem 1.5rem;
        border-radius: 0.75rem;
        font-size: 0.875rem;
        font-weight: 600;
        transition: all 0.2s;
        cursor: pointer;
        border: none;
      }
      .privacy-btn-primary {
        background: linear-gradient(to right, rgb(99, 102, 241), rgb(139, 92, 246));
        color: white;
        box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.2);
      }
      .privacy-btn-primary:hover { box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2); }
      .privacy-btn-secondary {
        background: rgb(241, 245, 249);
        color: rgb(71, 85, 105);
      }
      .privacy-btn-secondary:hover { background: rgb(226, 232, 240); }
    </style>
    <script>
      // 深色模式初始化（在 React 加载之前执行）
      (function() {
        // 检查 localStorage 中的用户偏好
        const savedTheme = localStorage.getItem('xinli_theme');
        const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (savedTheme === 'dark' || (!savedTheme && systemPrefersDark)) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();

      // 注册 Service Worker 以支持 PWA 离线使用
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('SW 注册成功:', reg.scope))
            .catch(err => console.log('SW 注册失败:', err));
        });
      }

      // 隐私声明检查（在 React 加载之前执行）
      (function() {
        const consented = localStorage.getItem('xinli_privacy_consent');
        if (consented === 'accepted') {
          // 已同意，正常加载 React
          return;
        }

        // 未同意，显示隐私声明弹窗
        document.addEventListener('DOMContentLoaded', function() {
          // 隐藏 React 根节点（避免闪现界面）
          var root = document.getElementById('root');
          if (root) root.style.display = 'none';

          // 创建弹窗
          var overlay = document.createElement('div');
          overlay.id = 'privacy-overlay';
          overlay.innerHTML = `
            <div id="privacy-backdrop"></div>
            <div id="privacy-modal">
              <div style="background: linear-gradient(to right, rgb(99, 102, 241), rgb(139, 92, 246)); padding: 1.25rem 1.5rem; color: white;">
                <div style="display: flex; align-items: center; gap: 0.75rem;">
                  <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12l2 2 4-4"/><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                  <div>
                    <h3 style="font-weight: 700; font-size: 1.125rem;">隐私与数据保护声明</h3>
                    <p style="font-size: 0.75rem; opacity: 0.9; margin-top: 0.125rem;">请阅读并同意后再开始使用</p>
                  </div>
                </div>
              </div>

              <div style="padding: 1.5rem; gap: 1rem; color: rgb(51, 65, 85); font-size: 0.875rem; max-height: 60vh; overflow-y: auto;">
                <div style="display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; background: rgb(238, 242, 255); border-radius: 0.75rem; border: 1px solid rgb(224, 231, 255);">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgb(79, 70, 229)" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
                  <div>
                    <h4 style="font-weight: 700; font-size: 0.75rem; color: rgb(49, 46, 129);">📦 数据存储方式</h4>
                    <p style="font-size: 0.75rem; line-height: 1.625; color: rgb(71, 85, 105); margin-top: 0.25rem;">
                      本应用所有对话记录、评估结果、工具使用数据均<strong>完全存储在您的本地浏览器</strong>（localStorage）中，不会上传至任何服务器。
                    </p>
                  </div>
                </div>

                <div style="display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; background: rgb(236, 253, 245); border-radius: 0.75rem; border: 1px solid rgb(187, 247, 208);">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgb(5, 150, 105)" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                  <div>
                    <h4 style="font-weight: 700; font-size: 0.75rem; color: rgb(6, 95, 70);">🔒 隐私保护承诺</h4>
                    <p style="font-size: 0.75rem; line-height: 1.625; color: rgb(71, 85, 105); margin-top: 0.25rem;">
                      我们<strong>不收集、不传输、不分享</strong>您的任何个人信息。您的对话内容只有您自己能看到。
                    </p>
                  </div>
                </div>

                <div style="display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; background: rgb(255, 251, 235); border-radius: 0.75rem; border: 1px solid rgb(253, 230, 138);">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgb(217, 119, 6)" stroke-width="2"><path d="M12 9v4"/><path d="M12 17h.01"/><path d="M10.29 3.7l-1.28 2.56a8 8 0 0 0-5.68 8.73l-2.57 1.28a1 1 0 0 0 .7 1.72l13.06 4.36a1 1 0 0 0 1.27-.64l2.57-1.28a8 8 0 0 0-5.68-8.73l-1.28-2.56a1 1 0 0 0-1.73-.7z"/></svg>
                  <div>
                    <h4 style="font-weight: 700; font-size: 0.75rem; color: rgb(146, 64, 14);">⚠️ 重要免责声明</h4>
                    <p style="font-size: 0.75rem; line-height: 1.625; color: rgb(71, 85, 105); margin-top: 0.25rem;">
                      本系统<strong>不能替代专业的医学诊断、精神科药物处方或专业线下心理治疗</strong>。如您正在经历严重的心理困扰，请及时联系专业心理医生或拨打危机干预热线。
                    </p>
                  </div>
                </div>

                <div style="display: flex; align-items: flex-start; gap: 0.75rem; padding: 0.75rem; background: rgb(255, 241, 242); border-radius: 0.75rem; border: 1px solid rgb(253, 205, 211);">
                  <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgb(225, 29, 72)" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-1.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-1.07-8.63A2 2 0 0 1 16.92 2h3a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-3"/></svg>
                  <div>
                    <h4 style="font-weight: 700; font-size: 0.75rem; color: rgb(159, 18, 57);">📞 危机干预资源</h4>
                    <p style="font-size: 0.75rem; line-height: 1.625; color: rgb(71, 85, 105); margin-top: 0.25rem;">
                      如您有自杀或自伤倾向，请立即拨打：<br/>
                      <strong>北京回龙观医院危机干预热线：800-810-1117</strong><br/>
                      <strong>希望24小时热线：400-161-9995</strong>
                    </p>
                  </div>
                </div>

                <label style="display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.75rem; background: rgb(248, 250, 252); border-radius: 0.75rem; border: 1px solid rgb(209, 213, 219); cursor: pointer;">
                  <input type="checkbox" id="privacy-check" style="margin-top: 0.125rem; accent-color: rgb(99, 102, 241);" />
                  <span style="font-size: 0.75rem; color: rgb(71, 85, 105); line-height: 1.625;">
                    我已阅读并理解上述声明，同意在使用本应用时<strong>所有数据仅存储在本地</strong>，并知晓本工具不能替代专业心理治疗。
                  </span>
                </label>
              </div>

              <div style="padding: 1rem 1.5rem; background: rgb(248, 250, 252); border-top: 1px solid rgb(226, 232, 240); display: flex; justify-content: flex-end; gap: 0.75rem;">
                <button onclick="handleDeclinePrivacy()" class="privacy-btn privacy-btn-secondary">
                  暂不使用
                </button>
                <button onclick="handleAcceptPrivacy()" class="privacy-btn privacy-btn-primary">
                  ✅ 同意并继续
                </button>
              </div>
            </div>
          `;

          document.body.appendChild(overlay);

          // 按钮事件
          window.handleAcceptPrivacy = function() {
            var checked = document.getElementById('privacy-check').checked;
            if (!checked) {
              alert('请先勾选同意框，再点击「同意并继续」');
              return;
            }
            localStorage.setItem('xinli_privacy_consent', 'accepted');
            var overlay = document.getElementById('privacy-overlay');
            if (overlay) overlay.remove();
            // 显示 React 根节点
            if (root) root.style.display = '';
          };

          window.handleDeclinePrivacy = function() {
            var overlay = document.getElementById('privacy-overlay');
            if (overlay) overlay.remove();
            if (root) root.style.display = '';
            alert('您需要同意隐私声明才能使用本应用。所有数据仅存储在您的本地浏览器中。');
          };
        });
      })();
    </script>
  </head>
  <body class="bg-[#F4F6F7] text-[#2C3E50] dark:bg-slate-900 dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
